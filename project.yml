name: Daybrief

options:
  bundleIdPrefix: co.daybrief
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Unsandboxed local dev build: no signing, no hardened runtime. Hardened
    # runtime + Developer ID notarization are a later release task.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""

packages:
  # The local Swift package at the repo root. The thin app target links its
  # `AppFeature` product, which transitively pulls in every other module.
  Daybrief:
    path: .

targets:
  Daybrief:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: App
    dependencies:
      - package: Daybrief
        product: AppFeature
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.daybrief.app
        PRODUCT_NAME: Daybrief
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Daybrief.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Crispy Studio."
